services:
  nats:
    image: nats:2.11-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: jobregator
      POSTGRES_PASSWORD: jobregator
      POSTGRES_DB: jobregator
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  scraper:
    build:
      context: ./services/scraper
      target: artifact
    environment:
      NATS_URL: nats://nats:4222
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-us}
      REMOTIVE_CATEGORIES: ${REMOTIVE_CATEGORIES:-devops,software-development,data,qa}
      JOBICY_INDUSTRIES: ${JOBICY_INDUSTRIES:-admin,engineering,dev}
      JOBICY_GEO: ${JOBICY_GEO:-usa}
      LOOKBACK_HOURS: ${LOOKBACK_HOURS:-48}
      PROFILE_PATH: /config/profile.yaml
    volumes:
      - ./config:/config:ro
    depends_on:
      - nats

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      target: artifact
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_DSN: postgresql://jobregator:jobregator@postgres:5432/jobregator
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      ENABLE_ENRICHMENT: ${ENABLE_ENRICHMENT:-true}
      MCP_SERVER_CMD: python
      MCP_SERVER_ARGS: "-m src.server"
      MCP_SERVER_WORKDIR: /mcp-server
      PROFILE_PATH: /config/profile.yaml
    volumes:
      - ./config:/config:ro
    depends_on:
      - nats
      - postgres

  dashboard:
    build:
      context: ./services/dashboard
      target: artifact
    environment:
      DATABASE_URL: postgresql://jobregator:jobregator@postgres:5432/jobregator
      NATS_URL: nats://nats:4222
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - nats

  notifier:
    build:
      context: ./services/notifier
      target: artifact
    environment:
      NATS_URL: nats://nats:4222
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      FIT_SCORE_THRESHOLD: ${FIT_SCORE_THRESHOLD:-0.7}
    depends_on:
      - nats

volumes:
  nats-data:
  pg-data:
